aid: pulsemcp
name: PulseMCP
description: >-
  PulseMCP is a community platform and directory dedicated to the Model
  Context Protocol (MCP) — the open protocol for connecting AI assistants
  and agents to external tools, data, and systems. Founded by Tadas
  Antanavicius (MCP Steering Committee) and Mike Coughlin in early 2025,
  PulseMCP curates searchable directories of MCP servers and clients,
  publishes use cases, runs the "Agentic Loop" newsletter, and operates a
  Discord community for builders. It also exposes a public PulseMCP
  Registry API (api.pulsemcp.com, v0.1) implementing the Generic MCP
  Registry API specification with PulseMCP-specific enriched metadata such
  as popularity, security analyses, and compatibility data. The PulseMCP
  GitHub organization additionally maintains MCP servers, the AIR
  collaboration framework, and shared agentic-engineering templates and
  artifacts. Access to the API requires contacting PulseMCP for a key and
  tenant ID; the directory and content are free to browse.
