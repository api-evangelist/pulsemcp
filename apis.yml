apis:
  - aid: pulsemcp:registry
    name: PulseMCP Registry API
    description: >-
      Public v0.1 API for browsing MCP servers, server versions, and
      ecosystem metadata in the PulseMCP Registry. Implements the Generic
      MCP Registry API specification with PulseMCP enrichments
      (popularity, security analyses, compatibility). Requires X-API-Key
      and X-Tenant-ID headers; rate limited to 200 req/min, 5,000 req/hr,
      10,000 req/day.
    humanURL: https://www.pulsemcp.com/api/docs/v0.1
